spring.datasource.url=jdbc:mysql://localhost:3306/salon_vencanice
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# JWT
# jwt.secret mora biti min. 32 karaktera (HS256). Za pravi deploy ovo bi trebalo da bude env promenljiva, ne u kodu.
jwt.secret=${JWT_SECRET:salon-vencanice-tajni-kljuc-za-diplomski-rad-2026}
jwt.expiration-ms=86400000